# Disable file name slugification so that accented characters in attached file names
# (e.g. "Équipe de raquettes FFT.jpg") are preserved and displayed correctly in galleries.
site.slugify-files=false

# Base URL for the site — required for absolute URLs in share links (Facebook, Twitter)
site.url=https://tc11.fr

# Instagram configuration
# 
# The fetcher uses this fallback chain:
# 1. Instagram API (graph.instagram.com) — if INSTAGRAM_ACCESS_TOKEN is configured (recommended)
# 2. Headless browser scraping via Playwright
# 3. Instagram Graph API (graph.facebook.com) — if both INSTAGRAM_ACCESS_TOKEN and INSTAGRAM_ACCOUNT_ID are configured
# 4. RSS Bridge (no authentication required, simple HTTP request)
# 5. Fallback instagram.json from classpath (if all else fails)
#
# Posts are kept in memory and served via REST endpoint at /instagram.json
# to ensure the static site generator sees the fetched posts.

tc11.instagram.enabled=true
tc11.instagram.username=tc11assb

# Contact email configuration
tc11.contact.email=tc11-assb@fft.fr

# Instagram API access token (recommended — only this is needed for graph.instagram.com)
# Set via GitHub Secret INSTAGRAM_ACCESS_TOKEN (see README for instructions)
tc11.instagram.access-token=${INSTAGRAM_ACCESS_TOKEN:}

# Instagram Business Account ID (optional — only needed for the legacy Graph API at graph.facebook.com)
# Set these via environment variables: INSTAGRAM_ACCOUNT_ID
# tc11.instagram.account-id=${INSTAGRAM_ACCOUNT_ID:}

# Instagram post blacklist (optional - exclude specific posts from the gallery)
# Comma-separated list of Instagram post shortcodes or full URLs to exclude
# Example: DKurQ_ktdgw,https://www.instagram.com/p/ABC123/
# Useful to hide outdated or inappropriate posts without deleting them from Instagram
tc11.instagram.blacklist=DKurQ_ktdgw
