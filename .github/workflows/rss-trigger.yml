name: Instagram Posts Trigger

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  check-instagram:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-1.49.0

      - name: Install Playwright browser and system dependencies
        run: ./mvnw -B exec:java -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps chromium"

      - name: Refresh Instagram fallback via Java test and detect changes
        id: instagram
        run: |
          set -euo pipefail

          ./mvnw -B -Dtest=InstagramFallbackRefreshTest#refreshFallbackFromPlaywrightLive \
            -Dtc11.test.instagram.refresh=true \
            -Dtc11.instagram.enabled=true \
            -Dtc11.instagram.output-file=src/main/resources/instagram.json \
            test | tee /tmp/instagram-smoke.log

          PRIMARY_LINE=$(grep -E 'INSTAGRAM_FALLBACK_PRIMARY=' /tmp/instagram-smoke.log | tail -n 1 || true)
          if [ -z "$PRIMARY_LINE" ]; then
            echo "Refresh test output missing INSTAGRAM_FALLBACK_PRIMARY"
            exit 1
          fi

          IDENTIFIER=${PRIMARY_LINE#*INSTAGRAM_FALLBACK_PRIMARY=}
          echo "identifier=$IDENTIFIER" >> "$GITHUB_OUTPUT"

          if git diff --quiet -- src/main/resources/instagram.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push if changed
        if: steps.instagram.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/main/resources/instagram.json
          git commit -m "chore(ci): refresh instagram fallback: ${{ steps.instagram.outputs.identifier }}"
          git push

      - name: Trigger deploy workflow
        if: steps.instagram.outputs.changed == 'true'
        run: gh workflow run deploy.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
